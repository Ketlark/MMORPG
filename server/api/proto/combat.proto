syntax = "proto3";

package combat;

option go_package = "mmorpg/server/api/proto";

service CombatService {
  rpc JoinCombat(JoinCombatRequest) returns (stream CombatEvent);
  rpc PerformAction(CombatAction) returns (ActionResult);
  rpc EndTurn(EndTurnRequest) returns (EndTurnResponse);
}

message JoinCombatRequest {
  string combat_id = 1;
}

message CombatAction {
  string combat_id = 1;
  oneof action {
    MoveAction move = 2;
    SpellAction spell = 3;
    SkipAction skip = 4;
  }
}

message MoveAction {
  int32 target_x = 1;
  int32 target_y = 2;
}

message SpellAction {
  string spell_id = 1;
  int32 target_x = 2;
  int32 target_y = 3;
}

message SkipAction {}

message ActionResult {
  bool success = 1;
  string error = 2;
  int32 action_points_remaining = 3;
  int32 movement_points_remaining = 4;
}

message EndTurnRequest {
  string combat_id = 1;
}

message EndTurnResponse {
  bool success = 1;
  string next_player_id = 2;
}

message CombatEvent {
  oneof event {
    CombatStarted combat_started = 1;
    TurnStarted turn_started = 2;
    PlayerAction player_action = 3;
    TurnEnded turn_ended = 4;
    CombatEnded combat_ended = 5;
  }
}

message CombatStarted {
  string combat_id = 1;
  repeated CombatFighter fighters = 2;
  repeated CombatCell cells = 3;
}

message CombatFighter {
  string player_id = 1;
  string username = 2;
  int32 team = 3;
  int32 x = 4;
  int32 y = 5;
  int32 health = 6;
  int32 max_health = 7;
  int32 action_points = 8;
  int32 movement_points = 9;
}

message CombatCell {
  int32 x = 1;
  int32 y = 2;
  bool walkable = 3;
}

message TurnStarted {
  string player_id = 1;
  int32 action_points = 2;
  int32 movement_points = 3;
}

message PlayerAction {
  string player_id = 1;
  oneof action_result {
    MoveResult move = 2;
    SpellResult spell = 3;
    SkipResult skip = 4;
  }
}

message MoveResult {
  int32 from_x = 1;
  int32 from_y = 2;
  int32 to_x = 3;
  int32 to_y = 4;
}

message SpellResult {
  string spell_id = 1;
  int32 caster_x = 2;
  int32 caster_y = 3;
  int32 target_x = 4;
  int32 target_y = 5;
  repeated DamageResult damages = 6;
}

message DamageResult {
  string target_id = 1;
  int32 damage = 2;
  int32 health_remaining = 3;
}

message SkipResult {}

message TurnEnded {
  string player_id = 1;
}

message CombatEnded {
  int32 winning_team = 1;
  repeated CombatReward rewards = 2;
}

message CombatReward {
  string player_id = 1;
  int32 experience = 2;
  int32 gold = 3;
}
