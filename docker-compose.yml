services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mmorpg
      POSTGRES_PASSWORD: mmorpg123
      POSTGRES_DB: mmorpg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmorpg"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    ports:
      - "50051:50051"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: mmorpg
      DB_PASSWORD: mmorpg123
      DB_NAME: mmorpg
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key-change-in-production-minimum-32-chars!
      SERVER_PORT: ":50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
